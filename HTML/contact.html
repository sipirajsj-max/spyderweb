<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyder Web | Contact Us</title>
    <link rel="stylesheet" href="/CSS/contact.css"> <link rel="stylesheet" href="/CSS/contact.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-spider"></i> SPYDER WEB</div>
            <div class="lang-switcher">
                <button onclick="changeLanguage('en')">EN</button>
                <button onclick="changeLanguage('ta')">தமிழ்</button>
                <button onclick="changeLanguage('si')">සිංහල</button>
            </div>
        </nav>

        <div class="contact-wrapper">
            <h1 class="metallic-text" data-key="foot_contact">CONTACT US</h1>
<p class="subtitle" data-key="contact_subtitle">Call us from anywhere in Sri Lanka</p>
            <div class="contact-grid">
                <div class="contact-info">
                    <div class="info-box">
                        <i class="fas fa-phone-alt"></i>
                        <h3>Phone</h3>
                        <p>0759467662</p>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-envelope"></i>
                        <h3>Email</h3>
                        <p>sipirajsj@gmail.com</p>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>Location</h3>
                        <p>Sri Lanka (Available Islandwide)</p>
                    </div>
                </div>

                <div class="contact-form-container">
    <form id="contactForm">
        <div class="input-group">
            <input type="text" data-key="placeholder_name" placeholder="Your Name" required>
        </div>
        <div class="input-group">
            <input type="email" data-key="placeholder_email" placeholder="Your Email" required>
        </div>
        <div class="input-group">
            <textarea data-key="placeholder_msg" placeholder="How can we help you?" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-primary" data-key="btn_send">SEND MESSAGE</button>
    </form>
</div>
            </div>
        </div>

        <footer class="bottom-bar">
            <div class="footer-links">
                <span><a href="index.html">HOME</a></span>
                <span><a href="about.html">ABOUT</a></span>
            </div>
            <div class="social-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-whatsapp"></i>
            </div>
        </footer>
    </div>
    <script src="/JS/contact.js"></script>
</body>
</html>
