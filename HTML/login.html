<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | Spyder Web</title>
    <link rel="stylesheet" href="/CSS/contact.css">
    <link rel="stylesheet" href="/CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <nav class="navbar">
            <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;"><i class="fas fa-spider"></i> SPYDER WEB</a></div>
            <div class="lang-switcher">
                <button onclick="changeLanguage('en')">EN</button>
                <button onclick="changeLanguage('ta')">தமிழ்</button>
                <button onclick="changeLanguage('si')">සිංහල</button>
            </div>
        </nav>

        <div class="auth-wrapper">
            <div class="auth-container">
                <div class="auth-toggle">
                    <button id="loginToggle" class="active" onclick="toggleAuth('login')" data-key="tab_login">LOGIN</button>
                    <button id="registerToggle" onclick="toggleAuth('register')" data-key="tab_register">REGISTER</button>
                </div>

                <form id="loginForm" class="auth-form">
                    <h2 data-key="login_title">Welcome Back</h2>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" data-key="ph_email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" data-key="ph_password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary" data-key="btn_login">SIGN IN</button>
                    <p class="switch-text"><span data-key="no_account">Don't have an account?</span> <a href="#" onclick="toggleAuth('register')" data-key="tab_register">Register</a></p>
                </form>

                <form id="registerForm" class="auth-form hidden">
                    <h2 data-key="register_title">Create Account</h2>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" data-key="ph_name" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" data-key="ph_email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" data-key="ph_phone" placeholder="Phone Number" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" data-key="ph_password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary" data-key="btn_register">CREATE ACCOUNT</button>
                    <p class="switch-text"><span data-key="have_account">Already have an account?</span> <a href="#" onclick="toggleAuth('login')" data-key="tab_login">Login</a></p>
                </form>
            </div>
        </div>
    </div>
    <script src="/JS/login.js"></script>
</body>
</html>
